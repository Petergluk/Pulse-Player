name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Поддержка если основная ветка называется master

# Права доступа, необходимые для деплоя на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Отмена параллельных сборок, чтобы деплоилась только самая свежая версия
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Ускоряет установку зависимостей

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          # Передаем название репозитория в Vite, чтобы правильно собрать пути для Github Pages
          # Например, если репозиторий my-app, то base url будет /my-app/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Папка, которую собирает Vite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
